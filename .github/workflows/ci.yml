name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test
        env:
          CI: "true"

      - name: Build CLI
        run: bun build src/cli.tsx --outdir dist --target bun

      - name: Smoke test built binary
        run: |
          bun dist/cli.js --version
          bun dist/cli.js --help

      - name: Verify line counts
        run: |
          src_lines=$(find src -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.sql' \) -exec cat {} + | wc -l)
          tests_lines=$(find tests -type f -name '*.ts' -exec cat {} + | wc -l)
          echo "src/ lines: $src_lines"
          echo "tests/ lines: $tests_lines"
          if [ "$src_lines" -lt 10000 ]; then
            echo "::error::src/ shrank below 10000 lines — possible accidental delete"
            exit 1
          fi

  lint:
    name: Lint summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Strict checks (no any, no @ts-ignore)
        run: |
          set -e
          # Forbid `any` in source (allow in tests if absolutely needed)
          if grep -rn ": any\b\|<any>\|as any\b" src/ --include='*.ts' --include='*.tsx' | grep -v '// allow-any:'; then
            echo "::error::Found 'any' usages in src/. Add '// allow-any: <reason>' if intentional."
            exit 1
          fi
          # Forbid @ts-ignore in src
          if grep -rn "@ts-ignore\|@ts-expect-error" src/ --include='*.ts' --include='*.tsx'; then
            echo "::error::Found @ts-ignore / @ts-expect-error in src/. Fix the underlying type instead."
            exit 1
          fi
          echo "Strict checks passed."

  summary:
    name: All checks passed
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "All CI checks green ✓"
