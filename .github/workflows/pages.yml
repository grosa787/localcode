name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Pages env requires this permission set
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, queue runs so the latest commit always lands.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install website dependencies
        working-directory: website
        run: bun install

      - name: Type-check
        working-directory: website
        run: bunx tsc --noEmit

      - name: Build
        working-directory: website
        # VITE_BASE — gh-pages serves under /<repo>/ unless a custom domain
        # is configured. Override at deploy time via repo variable PAGES_BASE.
        run: VITE_BASE=${{ vars.PAGES_BASE || '/localcode/' }} bun run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
